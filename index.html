<script>
const manifest={name:'ANG Gestione Cantieri',short_name:'ANG Cantieri',start_url:'.',display:'standalone',background_color:'#1B3A6B',theme_color:'#1B3A6B',icons:[{src:'icon.svg',sizes:'any',type:'image/svg+xml',purpose:'any maskable'}]};
const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
const link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(blob);document.head.appendChild(link);

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#1B3A6B;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;overflow:hidden}
:root{--blue:#1B3A6B;--blue-mid:#2d5a9e;--blue-light:#e8eef7;--green:#5BB534;--green-dark:#3d8022;--green-light:#edf7e5;--amber:#f59e0b;--red:#c0392b;--text:#1a1a2e;--text2:#6b7280;--bg:#f5f6fa;--card:#fff;--border:#e5e7eb}
#root{height:100%}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;background:var(--bg);max-width:430px;margin:0 auto;overflow:hidden}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:30px 24px;background:var(--blue);gap:0}
.login-logo{font-size:28px;font-weight:900;color:white;letter-spacing:.5px;margin-bottom:4px}
.login-logo span{color:var(--green)}
.login-sub{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:36px}
.login-card{background:white;border-radius:20px;padding:22px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px}
.login-title{font-size:15px;font-weight:700;color:var(--blue)}
.login-desc{font-size:12px;color:var(--text2);line-height:1.5}
.login-inp{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);font-size:16px;color:var(--text);font-family:inherit;outline:none;text-align:center;letter-spacing:3px}
.login-inp:focus{border-color:var(--blue)}
.login-btn{width:100%;padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.login-btn:active{opacity:.85}
.btn-admin{background:var(--blue);color:white}
.btn-squadra{background:var(--green);color:white}
.login-divider{text-align:center;font-size:12px;color:var(--text2);border-top:1px solid var(--border);padding-top:14px;margin-top:4px}
.top-bar{background:var(--blue);color:#fff;padding:env(safe-area-inset-top,44px) 18px 14px;flex-shrink:0;z-index:10}
.tb-row{display:flex;justify-content:space-between;align-items:center}
.tb-logo{font-size:17px;font-weight:800;letter-spacing:.3px}
.tb-logo span{color:var(--green)}
.tb-sub{font-size:11px;opacity:.7;margin-top:2px}
.tb-back{background:none;border:none;color:#fff;font-size:14px;cursor:pointer;padding:0;font-family:inherit}
.tb-detail-title{font-size:16px;font-weight:700;margin-top:6px}
.tb-detail-sub{font-size:11px;opacity:.7;margin-top:1px}
.av{width:34px;height:34px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;cursor:pointer}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 14px 80px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.screen::-webkit-scrollbar{display:none}
.card{background:var(--card);border-radius:16px;padding:14px 16px;border:1px solid var(--border)}
.card-title{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.lbl{font-size:12px;color:var(--text2);margin-bottom:4px;display:block;font-weight:500}
.inp{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);font-size:14px;color:var(--text);margin-bottom:10px;font-family:inherit;outline:none}
.inp:focus{border-color:var(--blue-mid);background:#fff}
.inp:last-child{margin-bottom:0}
.tab-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tab-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s}
.tab-btn.act{background:var(--blue);color:#fff;border-color:var(--blue)}
.check-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f3f4f6;cursor:pointer}
.check-item:last-child{border-bottom:none}
.check-item:active{opacity:.6}
.cbox{width:22px;height:22px;border-radius:6px;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.cbox.on{background:var(--green);border-color:var(--green);color:#fff;font-size:13px;font-weight:700}
.clbl{font-size:14px;color:var(--text)}
.clbl.on{color:#9ca3af;text-decoration:line-through}
.list-item{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid #f3f4f6;cursor:pointer}
.list-item:last-child{border-bottom:none}
.list-item:active{opacity:.6}
.li-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.li-name{font-size:15px;font-weight:600;color:var(--text)}
.li-sub{font-size:12px;color:var(--text2);margin-top:2px}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.b-corso{background:#fff4e0;color:#9a6200}
.b-att{background:var(--blue-light);color:var(--blue)}
.b-done{background:#f3f4f6;color:#6b7280}
.prog-bg{height:5px;background:#e9ecef;border-radius:10px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:10px;background:var(--green);transition:width .4s}
.team-av{width:40px;height:40px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--blue);flex-shrink:0}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f3f4f6}
.detail-row:last-child{border-bottom:none}
.dk{font-size:12px;color:var(--text2)}
.dv{font-size:13px;font-weight:600;color:var(--text);text-align:right;max-width:65%}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:var(--green-light);color:var(--green-dark)}
.pill-gray{background:#f3f4f6;color:#6b7280}
.cal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-month{font-size:13px;font-weight:700;color:var(--blue)}
.cal-nav{background:none;border:none;color:var(--blue);font-size:18px;cursor:pointer;padding:0 6px;font-family:inherit}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
.dn{font-size:10px;font-weight:700;color:var(--text2);padding:2px 0}
.d{font-size:12px;font-weight:500;padding:6px 2px;border-radius:7px;cursor:pointer;color:var(--text);border:.5px solid transparent;user-select:none;transition:all .15s}
.d:active{transform:scale(.9)}
.d.vuoto{opacity:0;pointer-events:none}
.d.oggi{border:2px solid var(--blue);font-weight:700}
.d.disp{background:#5BB534;color:#fff;border-color:#3d8022;font-weight:700}
.d.inst{background:#1B3A6B;color:#fff;border-color:#0c2d5e;font-weight:700}
.d.we{color:#ccc}
.legend{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.ldot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.btn-primary{width:100%;padding:13px;border-radius:12px;background:var(--blue);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-primary:active{transform:scale(.98)}
.btn-green{background:var(--green)}
.btn-red{background:var(--red)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 20px;gap:8px;color:var(--text2);text-align:center}
.empty-icon{font-size:36px}
.empty-text{font-size:14px;font-weight:500}
.empty-sub{font-size:12px;opacity:.7}
.fab{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom,0px));right:calc(50% - 200px + 16px);width:52px;height:52px;border-radius:50%;background:var(--green);border:none;color:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(91,181,52,.4);z-index:100}
.fab:active{transform:scale(.92)}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom,0px));z-index:50}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;font-size:10px;font-weight:600;color:#9ca3af;padding:4px 16px;font-family:inherit}
.nb.act{color:var(--blue)}
.ni{font-size:22px;line-height:1}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text2);font-size:13px;gap:8px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;padding:10px 20px;border-radius:25px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}
.codice-box{background:var(--blue-light);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.codice-val{font-size:20px;font-weight:800;color:var(--blue);letter-spacing:3px}
.codice-copy{background:var(--blue);color:white;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
</style>

<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script>
const SB_URL='https://bfcfgxpkwmlhvjhegmxv.supabase.co';
const SB_KEY='sb_publishable_KtswDOU_lLZsANRsCHaRHw_kYD3uCcv';
const ADMIN_PIN='1507';

async function sbFetch(path,opts){
  const res=await fetch(SB_URL+'/rest/v1/'+path,{
    headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation',...((opts&&opts.headers)||{})},
    ...opts
  });
  if(!res.ok){const e=await res.text();throw new Error(e)}
  const txt=await res.text();return txt?JSON.parse(txt):null;
}
const db={
  getCantieri:()=>sbFetch('cantieri?select=*,squadre(*)&order=id.desc'),
  getSquadre:()=>sbFetch('squadre?order=id.desc'),
  addCantiere:d=>sbFetch('cantieri',{method:'POST',body:JSON.stringify(d)}),
  updCantiere:(id,d)=>sbFetch('cantieri?id=eq.'+id,{method:'PATCH',body:JSON.stringify(d)}),
  delCantiere:id=>sbFetch('cantieri?id=eq.'+id,{method:'DELETE'}),
  addSquadra:d=>sbFetch('squadre',{method:'POST',body:JSON.stringify(d)}),
  delSquadra:id=>sbFetch('squadre?id=eq.'+id,{method:'DELETE'}),
  getSquadraByCode:async code=>{const r=await sbFetch('squadre?codice=eq.'+encodeURIComponent(code));return r&&r[0]},
};

const CHECKLIST=['Sopralluogo effettuato','Materiali ordinati','Materiali in cantiere','Posa impianto','Collaudo impianto'];
let session={role:null,squadraId:null,squadraNome:null};
let cantieri=[],squadre=[];
let ctx={screen:'',cantiereId:null,squadraId:null};
let calState={};

function saveSess(){localStorage.setItem('ang_sess',JSON.stringify(session))}
function loadSess(){try{const s=localStorage.getItem('ang_sess');if(s)session=JSON.parse(s)}catch{}}

function pct(c){if(!c.check_list||!c.check_list.length)return 0;return Math.round(c.check_list.filter(Boolean).length/c.check_list.length*100)}
function sColor(p){return p===100?'#9ca3af':p>0?'#f59e0b':'#1B3A6B'}
function sBadge(p){return p===100?'b-done':p>0?'b-corso':'b-att'}
function sTxt(p){return p===100?'Completato':p>0?'In corso':'In attesa'}
function ini(n){const p=(n||'').trim().split(' ');return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():(n||'??').slice(0,2).toUpperCase()}
function genCode(){return 'ANG-'+Math.floor(1000+Math.random()*9000)}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

function setNav(s){
  ['dash','cantieri','squadre'].forEach(n=>{const el=document.getElementById('n-'+n);if(el)el.classList.remove('act')});
  const m={dashboard:'dash',cantieri:'cantieri','nuovo-cantiere':'cantieri','dettaglio-cantiere':'cantieri',squadre:'squadre','dettaglio-squadra':'squadre'};
  if(m[s]){const el=document.getElementById('n-'+m[s]);if(el)el.classList.add('act')}
}

const MONTHS=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
function calDIM(y,m){return new Date(y,m+1,0).getDate()}
function calFirst(y,m){let d=new Date(y,m,1).getDay();return d===0?6:d-1}

function renderCal(id,y,m,sel,css){
  const today=new Date();const dim=calDIM(y,m),first=calFirst(y,m);
  let cells='';
  for(let i=0;i<first;i++)cells+=`<div class="d vuoto"></div>`;
  for(let d=1;d<=dim;d++){
    const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    const dow=(first+d-1)%7;const isWe=dow===5||dow===6;
    const isSel=sel.includes(key);
    const cls='d'+(isT?' oggi':'')+(isSel?' '+css:isWe?' we':'');
    cells+=`<div class="${cls}" onclick="calToggle('${id}','${key}')">${d}</div>`;
  }
  const dn=['L','M','M','G','V','S','D'].map(d=>`<div class="dn">${d}</div>`).join('');
  return `<div class="cal-hdr"><button class="cal-nav" onclick="calNav('${id}',-1)">‹</button><span class="cal-month">${MONTHS[m]} ${y}</span><button class="cal-nav" onclick="calNav('${id}',1)">›</button></div><div class="cal-grid">${dn}${cells}</div>`;
}
function initCal(id,sel,css,readonly){const n=new Date();calState[id]={y:n.getFullYear(),m:n.getMonth(),selected:[...(sel||[])],css,readonly:!!readonly};refreshCal(id)}
function refreshCal(id){const el=document.getElementById(id);if(el){const s=calState[id];el.innerHTML=renderCal(id,s.y,s.m,s.selected,s.css,s.readonly)}}
window.calNav=function(id,dir){const s=calState[id];s.m+=dir;if(s.m>11){s.m=0;s.y++}if(s.m<0){s.m=11;s.y--}refreshCal(id)}
window.calToggle=async function(id,key){
  const s=calState[id];if(s.readonly)return;
  const i=s.selected.indexOf(key);
  if(i>=0)s.selected.splice(i,1);else s.selected.push(key);
  refreshCal(id);
  if(ctx.cantiereId){
    const upd={};
    if(id==='cal-disp')upd.disponibilita=s.selected;
    if(id==='cal-inst')upd.installazioni=s.selected;
    try{await db.updCantiere(ctx.cantiereId,upd)}catch(e){toast('Errore salvataggio')}
  }
}

function renderApp(){
  const isAdmin=session.role==='admin';
  document.getElementById('root').innerHTML=`
    <div id="app">
      <div class="top-bar" id="topBar"></div>
      <div class="screen" id="screen"></div>
      <nav class="bnav">
        <button class="nb" id="n-dash" onclick="go('dashboard')"><span class="ni">⊞</span>Dashboard</button>
        <button class="nb" id="n-cantieri" onclick="go('cantieri')"><span class="ni">🏗</span>Cantieri</button>
        ${isAdmin?`<button class="nb" id="n-squadre" onclick="go('squadre')"><span class="ni">👷</span>Squadre</button>`:''}
      </nav>
    </div>`;
}

async function go(screen,opts){
  opts=opts||{};
  if(opts.cantiereId!==undefined)ctx.cantiereId=opts.cantiereId;
  if(opts.squadraId!==undefined)ctx.squadraId=opts.squadraId;
  ctx.screen=screen;calState={};setNav(screen);
  const tb=document.getElementById('topBar'),sc=document.getElementById('screen');
  sc.innerHTML=`<div class="loading"><div class="spinner"></div>Caricamento...</div>`;
  sc.scrollTop=0;
  try{
    cantieri=await db.getCantieri()||[];
    if(session.role==='admin')squadre=await db.getSquadre()||[];
  }catch(e){toast('Errore connessione')}
  render(screen,tb,sc);
}

function avBtn(){const isAdmin=session.role==='admin';return `<div class="av" onclick="logout()" title="Esci">${isAdmin?'A':ini(session.squadraNome||'')}</div>`}

function render(s,tb,sc){
  const isAdmin=session.role==='admin';

  if(s==='dashboard'){
    const nome=isAdmin?'Admin':session.squadraNome||'Squadra';
    const mc=isAdmin?cantieri:cantieri.filter(c=>c.squadra_id===session.squadraId);
    const attivi=mc.filter(c=>pct(c)<100);
    tb.innerHTML=`<div class="tb-row"><div><div class="tb-logo">⚡ ATHENA <span>Next Gen</span></div><div class="tb-sub">Ciao ${nome} 👋</div></div>${avBtn()}</div>`;
    sc.innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="card" style="padding:14px 12px"><div class="lbl" style="margin-bottom:5px">Cantieri attivi</div><div style="font-size:26px;font-weight:800;color:var(--blue)">${attivi.length}</div></div>
        <div class="card" style="padding:14px 12px"><div class="lbl" style="margin-bottom:5px">Completati</div><div style="font-size:26px;font-weight:800;color:var(--green)">${mc.filter(c=>pct(c)===100).length}</div></div>
        ${isAdmin?`<div class="card" style="padding:14px 12px"><div class="lbl" style="margin-bottom:5px">Squadre</div><div style="font-size:26px;font-weight:800;color:var(--blue)">${squadre.length}</div></div><div class="card" style="padding:14px 12px"><div class="lbl" style="margin-bottom:5px">kWp totali</div><div style="font-size:22px;font-weight:800;color:var(--blue)">${cantieri.reduce((a,c)=>a+parseFloat(c.kw||0),0).toFixed(1)}</div></div>`:''}
      </div>
      ${attivi.length===0?`<div class="card"><div class="empty-state"><div class="empty-icon">🏗</div><div class="empty-text">Nessun cantiere attivo</div></div></div>`:`
      <div class="card"><div class="card-title">Cantieri in corso</div>
        ${attivi.map(c=>`<div class="list-item" onclick="go('dettaglio-cantiere',{cantiereId:${c.id}})">
          <div class="li-dot" style="background:${sColor(pct(c))}"></div>
          <div style="flex:1"><div class="li-name">${c.cliente}</div><div class="li-sub">${c.kw?c.kw+' kWp':''}</div>${c.installazioni&&c.installazioni.length>0?`<div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap">${c.installazioni.slice().sort().map(d=>{const p=d.split('-');return `<span style="background:#e8eef7;color:#1B3A6B;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px">${p[2]}/${p[1]}</span>`}).join('')}</div>`:''}<div class="prog-bg"><div class="prog-fill" style="width:${pct(c)}%"></div></div></div>
          <span class="badge ${sBadge(pct(c))}">${pct(c)}%</span>
        </div>`).join('')}
      </div>`}`;
    return;
  }

  if(s==='cantieri'){
    const mc=isAdmin?cantieri:cantieri.filter(c=>c.squadra_id===session.squadraId);
    tb.innerHTML=`<div class="tb-row"><div><div class="tb-logo">⚡ <span>Cantieri</span></div><div class="tb-sub">${mc.length} impianti</div></div>${avBtn()}</div>`;
    sc.innerHTML=mc.length===0?`<div class="card"><div class="empty-state"><div class="empty-icon">🏗</div><div class="empty-text">Nessun cantiere</div><div class="empty-sub">${isAdmin?'Tocca + per aggiungerne uno':'Nessun cantiere assegnato'}</div></div></div>${isAdmin?`<button class="fab" onclick="go('nuovo-cantiere')">+</button>`:''}`:`
      <div class="card">${mc.map(c=>`
        <div class="list-item" onclick="go('dettaglio-cantiere',{cantiereId:${c.id}})">
          <div class="li-dot" style="background:${sColor(pct(c))}"></div>
          <div style="flex:1">
            <div class="li-name">${c.cliente}</div>
            <div class="li-sub">${c.kw?c.kw+' kWp':'—'}${c.acc?' · '+c.acc+' kWh':''}</div>
            ${c.installazioni&&c.installazioni.length>0?`<div style="margin-top:4px;display:flex;align-items:center;gap:4px;flex-wrap:wrap">${c.installazioni.slice().sort().map(d=>{const p=d.split('-');return `<span style="background:#e8eef7;color:#1B3A6B;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px">${p[2]}/${p[1]}</span>`}).join('')}</div>`:''}
          </div>
          <div style="text-align:right;flex-shrink:0"><span class="badge ${sBadge(pct(c))}">${sTxt(pct(c))}</span><div style="font-size:11px;color:var(--text2);margin-top:3px">${pct(c)}%</div></div>
        </div>`).join('')}
      </div>${isAdmin?`<button class="fab" onclick="go('nuovo-cantiere')">+</button>`:''}`;
    return;
  }

  if(s==='nuovo-cantiere'){
    tb.innerHTML=`<div class="tb-row"><button class="tb-back" onclick="go('cantieri')">← Cantieri</button></div><div class="tb-detail-title">Nuovo cantiere</div>`;
    const sqOpts=squadre.map((sq,i)=>`<button class="tab-btn" id="sq-tab-${i}" onclick="selectSq(${sq.id},${i})">${sq.referente.split(' ')[0]}</button>`).join('');
    sc.innerHTML=`
      <div class="card"><div class="card-title">Cliente</div>
        <span class="lbl">Nome cognome / Ragione sociale</span>
        <input class="inp" id="nc-cliente" placeholder="es. Mario Rossi" type="text">
      </div>
      <div class="card"><div class="card-title">Squadra assegnata</div>
        ${squadre.length===0?`<div style="font-size:13px;color:var(--text2)">Nessuna squadra. Aggiungila prima.</div>`:`<div class="tab-row">${sqOpts}</div><div id="sq-lbl" style="font-size:11px;color:var(--text2)">Tocca per selezionare</div>`}
      </div>
      <div class="card"><div class="card-title">Impianto</div>
        <span class="lbl">Potenza impianto (kWp)</span>
        <input class="inp" id="nc-kw" placeholder="es. 8.4" type="number" step="0.1">
        <span class="lbl">Capacità accumulo (kWh)</span>
        <input class="inp" id="nc-acc" placeholder="es. 10" type="number" step="0.1" style="margin-bottom:0">
      </div>
      <div class="card"><div class="card-title">Checklist</div>
        ${CHECKLIST.map((item,i)=>`<div class="check-item" onclick="ncToggle(${i})"><div class="cbox" id="nc-cb-${i}"></div><span class="clbl" id="nc-cl-${i}">${item}</span></div>`).join('')}
      </div>
      <button class="btn-primary" onclick="salvaCantiere()">Salva cantiere</button>
      <div style="height:8px"></div>`;
    window._ncCheck=CHECKLIST.map(()=>false);window._ncSq=null;
    return;
  }

  if(s==='dettaglio-cantiere'){
    const c=cantieri.find(x=>x.id===ctx.cantiereId);
    if(!c){go('cantieri');return}
    const sq=c.squadre;
    tb.innerHTML=`
      <div class="tb-row"><button class="tb-back" onclick="go('cantieri')">← Cantieri</button><span class="badge ${sBadge(pct(c))}">${sTxt(pct(c))}</span></div>
      <div class="tb-detail-title">${c.cliente}</div>
      <div class="tb-detail-sub">${c.kw?c.kw+' kWp':''}${c.acc?' · '+c.acc+' kWh':''}</div>
      <div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="opacity:.8">Avanzamento</span><span id="pct-lbl" style="color:var(--green);font-weight:700">${pct(c)}%</span></div><div class="prog-bg"><div class="prog-fill" id="pct-bar" style="width:${pct(c)}%"></div></div></div>`;
    const sqTabs=isAdmin?squadre.map(sq2=>`<button class="tab-btn ${c.squadra_id===sq2.id?'act':''}" onclick="assegnaSq(${c.id},${sq2.id})" id="sqd-${sq2.id}">${sq2.referente.split(' ')[0]}</button>`).join(''):'';
    sc.innerHTML=`
      <div class="card"><div class="card-title">Dettagli</div>
        <div class="detail-row"><span class="dk">Potenza</span><span class="dv">${c.kw?c.kw+' kWp':'—'}</span></div>
        <div class="detail-row"><span class="dk">Accumulo</span><span class="dv">${c.acc?c.acc+' kWh':'—'}</span></div>
        <div class="detail-row"><span class="dk">Squadra</span><span class="dv">${sq?sq.referente:'Non assegnata'}</span></div>
      </div>
      ${isAdmin&&squadre.length>0?`<div class="card"><div class="card-title">Cambia squadra</div><div class="tab-row">${sqTabs}</div></div>`:''}      <div class="card"><div class="card-title">Checklist</div>
        ${CHECKLIST.map((item,i)=>`<div class="check-item" onclick="toggleCheck(${c.id},${i})"><div class="cbox ${c.check_list[i]?'on':''}" id="cb-${c.id}-${i}">${c.check_list[i]?'✓':''}</div><span class="clbl ${c.check_list[i]?'on':''}" id="cl-${c.id}-${i}">${item}</span></div>`).join('')}
      </div>
      <div class="card"><div class="card-title">Disponibilità squadra</div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:10px">Tocca i giorni per segnare la disponibilità</div>
        <div id="cal-disp"></div>
        <div class="legend"><div class="leg"><div class="ldot" style="background:#5BB534;border:.5px solid #3d8022"></div>Disponibile</div></div>
      </div>
      <div class="card"><div class="card-title">Attività programmate — Installazione</div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:6px">${isAdmin?'Tocca i giorni per programmare l\'installazione':'Compilazione a cura dell\'amministratore'}</div>
        ${!isAdmin?`<div style="font-size:11px;font-weight:600;color:var(--amber);background:#fff4e0;border-radius:8px;padding:6px 10px;margin-bottom:8px">🔒 Sola lettura</div>`:''}
        <div id="cal-inst"></div>
        <div class="legend"><div class="leg"><div class="ldot" style="background:#1B3A6B;border:.5px solid #0c2d5e"></div>Installazione</div></div>
      </div>
      ${isAdmin?`<button class="btn-primary btn-red" onclick="eliminaCantiere(${c.id})">Elimina cantiere</button>`:''}
      <div style="height:8px"></div>`;
    setTimeout(()=>{
      initCal('cal-disp',c.disponibilita||[],'disp');
      initCal('cal-inst',c.installazioni||[],'inst',!isAdmin);
    },0);
    return;
  }

  if(s==='squadre'){
    tb.innerHTML=`<div class="tb-row"><div><div class="tb-logo">⚡ <span>Squadre</span></div><div class="tb-sub">${squadre.length} squadre</div></div>${avBtn()}</div>`;
    sc.innerHTML=`
      ${squadre.length===0?`<div class="card"><div class="empty-state"><div class="empty-icon">👷</div><div class="empty-text">Nessuna squadra</div></div></div>`:`
      <div class="card"><div class="card-title">Squadre attive</div>
        ${squadre.map(sq=>{
          const nC=cantieri.filter(c=>c.squadra_id===sq.id).length;
          return `<div class="list-item" onclick="go('dettaglio-squadra',{squadraId:${sq.id}})">
            <div class="team-av">${ini(sq.referente)}</div>
            <div style="flex:1"><div class="li-name">${sq.referente}</div><div class="li-sub">${sq.ditta||''}</div></div>
            <span class="pill ${nC===0?'pill-gray':''}">${nC} cantier${nC===1?'e':'i'}</span>
            <div style="font-size:18px;color:#ccc;margin-left:8px">›</div>
          </div>`;
        }).join('')}
      </div>`}
      <div class="card" style="border:1.5px solid var(--blue-light)">
        <div class="card-title" style="color:var(--green)">Nuova squadra</div>
        <span class="lbl">Nome cognome referente</span>
        <input class="inp" id="ns-ref" placeholder="es. Marco Rossi" type="text">
        <span class="lbl">Ragione sociale ditta</span>
        <input class="inp" id="ns-ditta" placeholder="es. Rossi Impianti Srl" type="text">
        <span class="lbl">Telefono</span>
        <input class="inp" id="ns-tel" placeholder="es. 348 000 0000" type="tel">
        <span class="lbl">Email</span>
        <input class="inp" id="ns-email" placeholder="es. info@rossi.it" type="email" style="margin-bottom:0">
        <button class="btn-primary btn-green" style="margin-top:12px" onclick="salvaSquadra()">Salva squadra</button>
      </div>
      <div style="height:8px"></div>`;
    return;
  }

  if(s==='dettaglio-squadra'){
    const sq=squadre.find(x=>x.id===ctx.squadraId);
    if(!sq){go('squadre');return}
    const miei=cantieri.filter(c=>c.squadra_id===sq.id);
    tb.innerHTML=`<div class="tb-row"><button class="tb-back" onclick="go('squadre')">← Squadre</button></div><div class="tb-detail-title">${sq.referente}</div><div class="tb-detail-sub">${sq.ditta||''}</div>`;
    sc.innerHTML=`
      <div class="card"><div class="card-title">Contatti</div>
        ${sq.telefono?`<div class="detail-row"><span class="dk">Telefono</span><a href="tel:${sq.telefono}" style="font-size:13px;font-weight:600;color:var(--blue-mid);text-decoration:none">${sq.telefono}</a></div>`:''}
        ${sq.email?`<div class="detail-row"><span class="dk">Email</span><a href="mailto:${sq.email}" style="font-size:12px;font-weight:600;color:var(--blue-mid);text-decoration:none">${sq.email}</a></div>`:''}
        ${sq.ditta?`<div class="detail-row"><span class="dk">Ditta</span><span class="dv">${sq.ditta}</span></div>`:''}
      </div>
      <div class="card"><div class="card-title">Codice accesso squadra</div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:8px">Invia questo codice alla squadra via WhatsApp</div>
        <div class="codice-box">
          <span class="codice-val">${sq.codice}</span>
          <button class="codice-copy" onclick="copyCode('${sq.codice}')">Copia</button>
        </div>
      </div>
      <div class="card"><div class="card-title">Cantieri assegnati</div>
        ${miei.length===0?`<div class="empty-state" style="padding:20px 0"><div class="empty-icon" style="font-size:28px">🏗</div><div class="empty-text" style="font-size:13px">Nessun cantiere assegnato</div></div>`
        :miei.map(c=>`<div class="list-item" onclick="go('dettaglio-cantiere',{cantiereId:${c.id}})">
          <div class="li-dot" style="background:${sColor(pct(c))}"></div>
          <div style="flex:1">
            <div class="li-name">${c.cliente}</div>
            <div class="li-sub">${c.kw?c.kw+' kWp':''} · ${sTxt(pct(c))}</div>
            ${c.installazioni&&c.installazioni.length>0?`
            <div style="margin-top:5px;display:flex;align-items:center;gap:4px;flex-wrap:wrap">
              <span style="font-size:10px;color:var(--text2);font-weight:600">📅</span>
              ${c.installazioni.slice().sort().map(d=>{const p=d.split('-');return `<span style="background:#1B3A6B;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px">${p[2]}/${p[1]}/${p[0].slice(2)}</span>`}).join('')}
            </div>`:''}
          </div>
          <div style="font-size:18px;color:#ccc;flex-shrink:0">›</div>
        </div>`).join('')}
      </div>
      <button class="btn-primary btn-red" onclick="eliminaSquadra(${sq.id})">Elimina squadra</button>
      <div style="height:8px"></div>`;
    return;
  }
}

// AZIONI
window.selectSq=function(id,i){
  window._ncSq=id;
  document.querySelectorAll('[id^="sq-tab-"]').forEach(b=>b.classList.remove('act'));
  const btn=document.getElementById('sq-tab-'+i);if(btn)btn.classList.add('act');
  const sq=squadre.find(x=>x.id===id);
  const lbl=document.getElementById('sq-lbl');if(lbl&&sq)lbl.textContent='Squadra: '+sq.referente;
};
window.ncToggle=function(i){
  window._ncCheck[i]=!window._ncCheck[i];
  const box=document.getElementById('nc-cb-'+i),lbl=document.getElementById('nc-cl-'+i);
  if(window._ncCheck[i]){box.classList.add('on');box.textContent='✓';lbl.classList.add('on')}
  else{box.classList.remove('on');box.textContent='';lbl.classList.remove('on')}
};
window.salvaCantiere=async function(){
  const cliente=document.getElementById('nc-cliente').value.trim();
  if(!cliente){toast('⚠️ Inserisci il nome del cliente');return}
  try{
    await db.addCantiere({cliente,kw:document.getElementById('nc-kw').value||null,acc:document.getElementById('nc-acc').value||null,squadra_id:window._ncSq||null,check_list:window._ncCheck,disponibilita:[],installazioni:[]});
    toast('✓ Cantiere salvato!');go('cantieri');
  }catch(e){toast('Errore salvataggio')}
};
window.toggleCheck=async function(cId,i){
  const c=cantieri.find(x=>x.id===cId);if(!c)return;
  c.check_list[i]=!c.check_list[i];
  const box=document.getElementById(`cb-${cId}-${i}`),lbl=document.getElementById(`cl-${cId}-${i}`);
  if(box&&lbl){if(c.check_list[i]){box.classList.add('on');box.textContent='✓';lbl.classList.add('on')}else{box.classList.remove('on');box.textContent='';lbl.classList.remove('on')}}
  try{
    await db.updCantiere(cId,{check_list:c.check_list});
    const p=pct(c);
    const bar=document.getElementById('pct-bar');if(bar)bar.style.width=p+'%';
    const pl=document.getElementById('pct-lbl');if(pl)pl.textContent=p+'%';
  }catch(e){toast('Errore salvataggio')}
};
window.assegnaSq=async function(cId,sqId){
  try{
    await db.updCantiere(cId,{squadra_id:sqId});
    const c=cantieri.find(x=>x.id===cId);if(c)c.squadra_id=sqId;
    document.querySelectorAll('[id^="sqd-"]').forEach(b=>b.classList.remove('act'));
    const btn=document.getElementById('sqd-'+sqId);if(btn)btn.classList.add('act');
    toast('✓ Squadra assegnata!');
  }catch(e){toast('Errore')}
};
window.eliminaCantiere=async function(id){
  if(!confirm('Eliminare questo cantiere?'))return;
  try{await db.delCantiere(id);toast('Cantiere eliminato');go('cantieri')}catch(e){toast('Errore')}
};
window.salvaSquadra=async function(){
  const ref=document.getElementById('ns-ref').value.trim();
  if(!ref){toast('⚠️ Inserisci il nome del referente');return}
  const codice=genCode();
  try{
    await db.addSquadra({referente:ref,ditta:document.getElementById('ns-ditta').value.trim(),telefono:document.getElementById('ns-tel').value.trim(),email:document.getElementById('ns-email').value.trim(),codice});
    toast('✓ Squadra salvata! Codice: '+codice);go('squadre');
  }catch(e){toast('Errore salvataggio')}
};
window.eliminaSquadra=async function(id){
  if(!confirm('Eliminare questa squadra?'))return;
  try{await db.delSquadra(id);toast('Squadra eliminata');go('squadre')}catch(e){toast('Errore')}
};
window.copyCode=function(code){
  navigator.clipboard.writeText(code).then(()=>toast('✓ Codice copiato!')).catch(()=>toast('Codice: '+code));
};
window.logout=function(){
  if(!confirm('Vuoi uscire?'))return;
  session={role:null,squadraId:null,squadraNome:null};saveSess();showLogin();
};

// LOGIN
function showLogin(){
  document.getElementById('root').innerHTML=`
    <div class="login-screen">
      <div class="login-logo">⚡ ATHENA <span>Next Gen</span></div>
      <div class="login-sub">Gestione Cantieri FV</div>
      <div class="login-card">
        <div class="login-title">Accedi come Admin</div>
        <div class="login-desc">Inserisci il PIN per accedere a tutte le funzioni</div>
        <input class="login-inp" id="admin-pin" type="password" placeholder="• • • •" maxlength="8">
        <button class="login-btn btn-admin" onclick="loginAdmin()">Entra come Admin</button>
        <div class="login-divider">oppure — accesso squadra</div>
        <div class="login-title">Codice squadra</div>
        <div class="login-desc">Inserisci il codice che ti ha inviato l'amministratore</div>
        <input class="login-inp" id="squadra-code" type="text" placeholder="ANG-0000" maxlength="8" style="text-transform:uppercase">
        <button class="login-btn btn-squadra" onclick="loginSquadra()">Entra come Squadra</button>
      </div>
    </div>`;
}
window.loginAdmin=function(){
  const pin=document.getElementById('admin-pin').value;
  if(pin!==ADMIN_PIN){toast('⚠️ PIN non corretto');return}
  session={role:'admin',squadraId:null,squadraNome:null};saveSess();startApp();
};
window.loginSquadra=async function(){
  const code=document.getElementById('squadra-code').value.trim().toUpperCase();
  if(!code){toast('⚠️ Inserisci il codice');return}
  document.getElementById('root').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--blue)"><div class="spinner" style="border-color:rgba(255,255,255,.3);border-top-color:white;width:30px;height:30px;border-width:3px"></div></div>`;
  try{
    const sq=await db.getSquadraByCode(code);
    if(!sq){showLogin();toast('⚠️ Codice non valido');return}
    session={role:'squadra',squadraId:sq.id,squadraNome:sq.referente};saveSess();startApp();
  }catch(e){showLogin();toast('Errore di connessione')}
};
function startApp(){renderApp();go('dashboard')}

// INIT
loadSess();
if(session.role){startApp()}else{showLogin()}
</script>
</body>
</html>
